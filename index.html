<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motos Zone Pro</title>
    <style>
        body { font-family: sans-serif; background-color: #000; color: white; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; }
        .card { background: #111; border-radius: 25px; overflow: hidden; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .img-box { width: 100%; height: 220px; background: #222; }
        img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 20px; text-align: center; }
        h1 { font-size: 24px; margin: 0; color: #fff; text-transform: uppercase; }
        .desc { color: #888; font-size: 14px; margin: 10px 0; line-height: 1.5; }
        .price { color: #ff3e3e; font-size: 28px; font-weight: bold; margin: 15px 0; }
        .btns { display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 15px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 16px; transition: 0.3s; text-align: center; }
        .wa { background: #25d366; color: white; }
        .call { background: #fff; color: #000; }
        .btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="img-box">
            <img src="https://images.triumphmotorcycles.co.uk/media-library/images/motorcycles/sport/r125/2023/yamaha-r125-icon-blue-studio-001.jpg" alt="Yamaha R125">
        </div>
        <div class="info">
            <h1>Yamaha YZF-R125</h1>
            <p class="desc">دراجة رياضية احترافية بتصميم R-Series. تجمع بين الأناقة والقوة الاقتصادية.</p>
            <div class="price">54,000 درهم</div>
            
            <div class="btns">
                <a href="https://wa.me/212667164684" class="btn wa">طلب عبر واتساب</a>
                <a href="tel:0667164684" class="btn call">اتصال مباشر</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
